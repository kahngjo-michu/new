<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼행시 마스터 | Samhaengsi Master</title>
    <style>
        :root {
            --primary-color: #1a237e;
            --accent-color: #3f51b5;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212121;
            --text-sub: #757575;
            --border-color: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            max-width: 480px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.8rem;
            color: var(--primary-color);
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 0.95rem;
            color: var(--text-sub);
        }

        .input-section {
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            background-color: #fff;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(63, 81, 181, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-color);
            transform: translateY(-1px);
        }

        .btn-copy {
            background-color: #f1f3f4;
            color: var(--text-main);
            display: none; /* 결과가 있을 때만 표시 */
        }

        .btn-copy:hover {
            background-color: #e8eaed;
        }

        #result-area {
            margin-top: 40px;
            text-align: left;
        }

        .poem-card {
            padding: 24px;
            background-color: #fafafa;
            border-radius: 16px;
            border-left: 4px solid var(--primary-color);
            display: none;
            animation: slideUp 0.4s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .poem-line {
            margin-bottom: 16px;
            display: flex;
            align-items: center;
        }

        .poem-line:last-child {
            margin-bottom: 0;
        }

        .initial-box {
            width: 36px;
            height: 36px;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            font-weight: 900;
            font-size: 1.1rem;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .content-text {
            font-size: 1.05rem;
            color: #333;
            font-weight: 500;
            line-height: 1.5;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #bdc3c7;
        }

        /* Toast UI */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>SAMHAENGSI</h1>
        <p>당신의 소중한 이름으로 따뜻한 삼행시를 만듭니다.</p>
    </div>

    <div class="input-section">
        <input type="text" id="nameInput" placeholder="이름을 입력하세요 (예: 김철수)" maxlength="10">
    </div>

    <div class="btn-group">
        <button class="btn-primary" onclick="generatePoem()">삼행시 생성 ✨</button>
        <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">복사하기 📋</button>
    </div>

    <div id="result-area">
        <div id="poemCard" class="poem-card">
            <!-- 결과가 들어올 곳 -->
        </div>
    </div>

    <div class="footer">
        © 2026 Samhaengsi Master. All rights reserved.
    </div>
</div>

<div id="toast">복사되었습니다!</div>

<script>
    const database = {
        '가': ['가장 소중한 당신의 꿈을 응원합니다', '가슴 속 깊이 간직한 열정을 깨워보세요', '가까이서 보면 더 빛나는 당신입니다', '가을 햇살처럼 따스한 미소를 가진 사람', '가식 없는 당신의 솔직함이 좋습니다'],
        '나': ['나의 하루를 밝혀주는 당신의 존재', '나를 믿고 앞으로 나아가는 용기', '나른한 일상에 활력을 불어넣어 줄게요', '나만의 색깔로 세상을 칠해보세요', '나눌수록 커지는 행복을 실천하는 분'],
        '다': ['다시 시작할 수 있는 힘은 내 안에 있습니다', '다정한 말 한마디가 세상을 바꿉니다', '다채로운 매력으로 가득한 당신', '다 비워내고 새로움을 채울 시간입니다', '다시는 오지 않을 오늘을 소중히 여겨요'],
        '라': ['라일락 향기처럼 은은하게 퍼지는 매력', '라인업을 화려하게 장식할 주인공', '라디오에서 흘러나오는 노래 같은 편안함', '라이브처럼 생동감 넘치는 당신의 삶', '라라라 즐겁게 노래하며 걸어가요'],
        '마': ['마음 속 깊이 평화가 깃들기를 바랍니다', '마지막까지 포기하지 않는 당신이 멋집니다', '마법처럼 좋은 일만 일어날 거예요', '마주보는 눈빛에서 진심이 느껴져요', '마음껏 웃을 수 있는 오늘이 되길'],
        '바': ['바라만 봐도 기분이 좋아지는 사람', '바람처럼 시원한 당신의 성격이 좋아요', '바다처럼 넓은 마음을 가진 당신', '바보처럼 착한 당신의 진심을 압니다', '바삐 움직이는 세상 속 쉼표가 되어줄게요'],
        '사': ['사랑 가득한 눈으로 세상을 바라보세요', '사실 당신은 누구보다 특별한 사람입니다', '사소한 행복이 모여 큰 기쁨이 됩니다', '사계절 내내 변함없는 마음으로 응원해요', '사뿐사뿐 당신의 꿈을 향해 걸어가세요'],
        '아': ['아름다운 미래가 당신을 기다리고 있습니다', '아침 햇살처럼 눈부신 당신의 가능성', '아낌없이 주는 나무처럼 따뜻한 마음', '아주 작은 시작이 위대한 결과를 만듭니다', '아름다움은 당신의 내면에서 시작됩니다'],
        '자': ['자기 자신을 누구보다 사랑해주세요', '자신감 넘치는 당신의 모습이 아름답습니다', '자연스럽게 흘러가는 시간 속의 여유', '자꾸만 보고 싶어지는 매력적인 사람', '자유로운 영혼으로 세상을 누벼보세요'],
        '차': ['차분하게 생각하고 단단하게 행동하세요', '차가운 세상을 녹이는 따뜻한 미소', '차별화된 당신만의 능력을 보여주세요', '차곡차곡 쌓아온 노력이 결실을 맺을 거예요', '차 한 잔의 여유를 즐기는 오늘이 되길'],
        '카': ['카메라 렌즈에 담고 싶은 아름다운 순간', '카리스마 넘치는 당신의 결단력', '카페라떼처럼 부드러운 당신의 목소리', '카운트다운이 시작된 당신의 성공', '카타르시스를 느끼는 최고의 무대'],
        '타': ['타인을 배려하는 당신의 마음이 고귀합니다', '타이밍 좋게 나타난 당신은 행운입니다', '타오르는 불꽃처럼 뜨거운 당신의 열정', '타의 추종을 불허하는 독보적인 실력', '타인과 소통하며 함께 성장해나가요'],
        '파': ['파란 하늘처럼 맑은 영혼을 가진 당신', '파워풀한 에너지로 세상을 깨워주세요', '파도처럼 밀려오는 감동을 선사하는 사람', '파스텔톤 꿈을 현실로 만드는 능력', '파이팅 넘치는 당신의 오늘을 응원합니다'],
        '하': ['하늘 아래 가장 소중한 보물은 당신입니다', '하루하루 성장하는 당신의 모습이 기대돼요', '하얀 도화지에 당신의 꿈을 그려보세요', '하하하 크게 웃으며 행복을 만끽하세요', '하이라이트를 장식할 인생의 주인공은 당신']
    };

    function generatePoem() {
        const input = document.getElementById('nameInput');
        const card = document.getElementById('poemCard');
        const copyBtn = document.getElementById('copyBtn');
        const name = input.value.trim();

        if (!name) {
            alert('이름을 입력해주세요!');
            return;
        }

        let html = '';
        for (let char of name) {
            const phrases = database[char] || [`${char}상한 매력을 가진 당신입니다`, `${char}음에도 잊지 못할 소중한 이름`, `${char}곡하게 당신의 앞날을 응원합니다`, `${char}명히 멋진 일이 생길 거예요`];
            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
            
            html += `
                <div class="poem-line">
                    <div class="initial-box">${char}</div>
                    <div class="content-text">${randomPhrase}</div>
                </div>
            `;
        }

        card.innerHTML = html;
        card.style.display = 'block';
        copyBtn.style.display = 'block';
        
        // 애니메이션 재시작을 위해 클래스 제거 후 다시 추가
        card.style.animation = 'none';
        card.offsetHeight; /* trigger reflow */
        card.style.animation = null;
    }

    function copyToClipboard() {
        const card = document.getElementById('poemCard');
        const lines = card.querySelectorAll('.poem-line');
        let text = "";
        
        lines.forEach(line => {
            const initial = line.querySelector('.initial-box').innerText;
            const content = line.querySelector('.content-text').innerText;
            text += `${initial}: ${content}\n`;
        });

        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        });
    }

    // 엔터키 지원
    document.getElementById('nameInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            generatePoem();
        }
    });

    // 시작 시 포커스
    window.onload = () => document.getElementById('nameInput').focus();
</script>

</body>
</html>
