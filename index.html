<head>

    <style>
        :root {
            --primary-color: #1a237e;
            --accent-color: #3f51b5;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212121;
            --text-sub: #757575;
            --border-color: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            max-width: 520px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.8rem;
            color: var(--primary-color);
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 0.95rem;
            color: var(--text-sub);
        }

        .input-section {
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            background-color: #fff;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(63, 81, 181, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-color);
            transform: translateY(-1px);
        }

        .btn-copy {
            background-color: #f1f3f4;
            color: var(--text-main);
            display: none;
        }

        .btn-copy:hover {
            background-color: #e8eaed;
        }

        #result-area {
            margin-top: 40px;
            text-align: left;
        }

        .poem-card {
            padding: 24px;
            background-color: #fafafa;
            border-radius: 16px;
            border-left: 4px solid var(--primary-color);
            display: none;
            animation: slideUp 0.4s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .poem-line {
            margin-bottom: 16px;
            display: flex;
            align-items: center;
        }

        .poem-line:last-child {
            margin-bottom: 0;
        }

        .initial-box {
            width: 36px;
            height: 36px;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            font-weight: 900;
            font-size: 1.1rem;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .content-text {
            font-size: 1.05rem;
            color: #333;
            font-weight: 500;
            line-height: 1.5;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #bdc3c7;
        }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="app-container">

    </div>

    <div class="input-section">
        <input type="text" id="nameInput" placeholder="이름을 입력하세요 (예: 김철수)" maxlength="10">
    </div>

    <div class="btn-group">
        <button class="btn-primary" onclick="generatePoem()">삼행시 생성 ✨</button>
        <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">복사하기 📋</button>
    </div>

    <div id="result-area">
        <div id="poemCard" class="poem-card"></div>
    </div>

    <div class="footer">
        © 2026 Samhaengsi Master. All rights reserved.
    </div>
</div>

    function generatePoem() {
        const input = document.getElementById('nameInput');
        const card = document.getElementById('poemCard');
        const copyBtn = document.getElementById('copyBtn');
        const name = input.value.trim();

        if (!name) {
            alert('이름을 입력해주세요!');
            return;
        }

        let html = '';
        const len = name.length;

        for (let i = 0; i < len; i++) {
            const char = name[i];
            
            // 데이터가 없는 글자는 범용적이고 자연스러운 문구로 대체
            const data = database[char] || {
                start: [`${char}라는 이름에 담긴 소중한 가치를 알아요`, `${char}음부터 당신은 참 좋은 사람이었죠`, `${char}큼한 미소가 당신의 이름을 더 빛나게 해요`],
                middle: [`${char}연스럽게 묻어나는 따뜻한 인품이 좋아서`, `${char}신감 있는 모습이 주변을 밝게 비춰주네요`, `${char}꾸만 생각나는 당신만의 독특한 매력으로`],
                end: [`${char}말 고생 많았어요, 오늘은 꼭 푹 쉬어요`, `${char}일은 오늘보다 더 행복한 일이 생길 거예요`, `${char}분하게 오늘을 마무리하고 내일을 꿈꿔봐요`]
            };

            let type = 'middle';
            if (i === 0) type = 'start';
            else if (i === len - 1) type = 'end';

            const phrases = data[type] || data['middle'] || data['start'] || data['end'];
            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
            
            html += `
                <div class="poem-line">
                    <div class="initial-box">${char}</div>
                    <div class="content-text">${randomPhrase}</div>
                </div>
            `;
        }

        card.innerHTML = html;
        card.style.display = 'block';
        copyBtn.style.display = 'block';
        
        card.style.animation = 'none';
        card.offsetHeight; 
        card.style.animation = null;
    }

    function copyToClipboard() {
        const card = document.getElementById('poemCard');
        const lines = card.querySelectorAll('.poem-line');
        if (lines.length === 0) return;

        let text = "";
        lines.forEach(line => {
            const initial = line.querySelector('.initial-box').innerText;
            const content = line.querySelector('.content-text').innerText;
            text += `${initial}: ${content}\n`;
        });

        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(() => {
                showToast();
            });
        } else {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                console.error('복사 실패:', err);
            }
            document.body.removeChild(textArea);
        }
    }

    function showToast() {
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }

    document.getElementById('nameInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') generatePoem();
    });

    window.onload = () => document.getElementById('nameInput').focus();
</script>
