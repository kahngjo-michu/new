<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼행시 마스터 | Samhaengsi Master</title>
    <style>
        :root {
            --primary-color: #1a237e;
            --accent-color: #3f51b5;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212121;
            --text-sub: #757575;
            --border-color: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            max-width: 480px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.8rem;
            color: var(--primary-color);
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 0.95rem;
            color: var(--text-sub);
        }

        .input-section {
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            background-color: #fff;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(63, 81, 181, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-color);
            transform: translateY(-1px);
        }

        .btn-copy {
            background-color: #f1f3f4;
            color: var(--text-main);
            display: none;
        }

        .btn-copy:hover {
            background-color: #e8eaed;
        }

        #result-area {
            margin-top: 40px;
            text-align: left;
        }

        .poem-card {
            padding: 24px;
            background-color: #fafafa;
            border-radius: 16px;
            border-left: 4px solid var(--primary-color);
            display: none;
            animation: slideUp 0.4s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .poem-line {
            margin-bottom: 16px;
            display: flex;
            align-items: center;
        }

        .poem-line:last-child {
            margin-bottom: 0;
        }

        .initial-box {
            width: 36px;
            height: 36px;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            font-weight: 900;
            font-size: 1.1rem;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .content-text {
            font-size: 1.05rem;
            color: #333;
            font-weight: 500;
            line-height: 1.5;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #bdc3c7;
        }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>SAMHAENGSI</h1>
        <p>자연스럽게 흐르는 시적인 삼행시를 지어드립니다.</p>
    </div>

    <div class="input-section">
        <input type="text" id="nameInput" placeholder="이름을 입력하세요 (예: 김철수)" maxlength="10">
    </div>

    <div class="btn-group">
        <button class="btn-primary" onclick="generatePoem()">삼행시 생성 ✨</button>
        <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">복사하기 📋</button>
    </div>

    <div id="result-area">
        <div id="poemCard" class="poem-card"></div>
    </div>

    <div class="footer">
        © 2026 Samhaengsi Master. All rights reserved.
    </div>
</div>

<div id="toast">복사되었습니다!</div>

<script>
    // 문맥의 흐름(시작, 중간, 끝)에 따라 문구를 분류
    const database = {
        '가': {
            start: ['가장 먼저 떠오르는 소중한 이름', '가슴 속에 품어온 따뜻한 꿈'],
            middle: ['가까이서 지켜보는 것만으로도 행복해지는', '가늠할 수 없는 깊은 열정을 가진'],
            end: ['가장 눈부시게 빛날 당신의 미래를 응원합니다', '가식 없는 그 미소가 영원하길 바랍니다']
        },
        '나': {
            start: ['나의 하루를 밝게 비추는 당신'],
            middle: ['나를 믿고 묵묵히 걸어가는 그 뒷모습이', '나른한 일상 속에 활기를 불어넣어주는'],
            end: ['나만의 색깔로 멋진 세상을 그려가길 바랍니다', '나날이 더해가는 당신의 매력을 믿습니다']
        },
        '다': {
            start: ['다시 한번 돌아보게 만드는 매력'],
            middle: ['다정한 말 한마디로 세상을 녹여주는', '다채로운 빛깔로 삶을 채워나가는'],
            end: ['다시는 오지 않을 이 순간을 만끽하길 바랍니다', '다 실현될 당신의 소망을 간절히 기도합니다']
        },
        '라': {
            start: ['라일락 향기처럼 부드러운 존재'],
            middle: ['라이브 무대처럼 생동감 넘치는 매일매일이', '라인을 그리듯 우아하게 펼쳐지는 당신의'],
            end: ['라라라 즐겁게 노래하는 인생이 되길 바랍니다', '라이징 스타처럼 높이 날아오를 당신을 믿습니다']
        },
        '마': {
            start: ['마음 깊은 곳에서 우러나오는 진심'],
            middle: ['마지막까지 포기하지 않는 강인한 의지로', '마법처럼 사람들의 마음을 사로잡는'],
            end: ['마음껏 웃을 수 있는 행복한 날들만 가득하세요', '마주보는 모든 순간이 축복이 되길 바랍니다']
        },
        '바': {
            start: ['바라만 봐도 기분 좋아지는 사람'],
            middle: ['바람처럼 시원하고 바다처럼 넓은 마음으로', '바삐 움직이는 세상 속 나만의 쉼표가 되어'],
            end: ['바보 같을 만큼 순수한 열정이 결실을 맺길', '바라는 모든 일들이 마법처럼 이뤄질 것입니다']
        },
        '사': {
            start: ['사랑스러운 미소를 가진 당신'],
            middle: ['사계절 내내 변함없는 따뜻한 온기로', '사실 누구보다 깊은 내면의 아름다움을 품고'],
            end: ['사뿐히 내딛는 발걸음마다 꽃길이 펼쳐지길', '사라지지 않을 영원한 감동을 선사해주세요']
        },
        '아': {
            start: ['아름다운 이야기가 시작되는 오늘'],
            middle: ['아침 햇살보다 더 투명하고 맑은 영혼으로', '아무도 모르게 쌓아온 노력들이 빛을 발해'],
            end: ['아낌없이 사랑받고 사랑하는 삶이 되길 바랍니다', '아름다움 그 이상의 가치를 증명할 당신입니다']
        },
        '자': {
            start: ['자기만의 확고한 길을 걷는 사람'],
            middle: ['자연스럽게 스며드는 편안한 매력으로', '자신감 넘치는 그 당당한 눈빛 속에서'],
            end: ['자랑스러운 당신의 이름이 널리 알려지길', '자유로운 날개를 펴고 더 높이 비상하세요']
        },
        '차': {
            start: ['차분하게 자신의 때를 기다려온'],
            middle: ['차가운 세상 속에서도 뜨거운 심장을 가진', '차곡차곡 쌓아올린 실력과 인품으로'],
            end: ['차원이 다른 성공의 주인공이 될 것입니다', '차 한 잔의 여유 같은 평온함이 함께하길']
        },
        '카': {
            start: ['카리스마 넘치는 모습 뒤의 따뜻함'],
            middle: ['카메라에 담고 싶은 눈부신 모든 순간들이', '카타르시스를 느끼게 하는 압도적인 실력이'],
            end: ['카운트다운 끝에 시작될 당신의 전성기입니다', '카레라떼처럼 부드러운 축복이 깃들길 바랍니다']
        },
        '타': {
            start: ['타인을 먼저 생각하는 고귀한 마음'],
            middle: ['타이밍 좋게 찾아온 일생의 기회를 잡아', '타오르는 불꽃보다 더 뜨거운 열정으로'],
            end: ['타의 추종을 불허하는 최고의 자리에 서길', '타인에게 희망이 되는 존재로 남을 것입니다']
        },
        '파': {
            start: ['파란 하늘을 닮은 당신의 꿈'],
            middle: ['파워풀한 에너지로 세상을 깨워나가는', '파도처럼 밀려오는 감동의 물결 속에서'],
            end: ['파이팅 넘치는 당신의 매일이 성공으로 이어지길', '파스텔톤 행복이 인생을 가득 채우길 바랍니다']
        },
        '하': {
            start: ['하늘 아래 가장 빛나는 보석 같은 존재'],
            middle: ['하루하루 성실하게 꿈을 향해 나아가는', '해맑은 웃음소리가 온 세상에 퍼져나갈 때'],
            end: ['하이라이트를 장식할 인생의 주인공은 바로 당신', '하늘이 내려준 큰 복이 당신과 함께할 것입니다']
        }
    };

    function generatePoem() {
        const input = document.getElementById('nameInput');
        const card = document.getElementById('poemCard');
        const copyBtn = document.getElementById('copyBtn');
        const name = input.value.trim();

        if (!name) {
            alert('이름을 입력해주세요!');
            return;
        }

        let html = '';
        const len = name.length;

        for (let i = 0; i < len; i++) {
            const char = name[i];
            const data = database[char] || {
                start: [`${char}음부터 운명처럼 정해진 이름`],
                middle: [`${char}곡하게 이어온 소중한 인연으로`],
                end: [`${char}명히 멋진 결말을 맞이할 당신입니다`]
            };

            // 문맥 선택: 첫 글자(start), 마지막 글자(end), 그 외(middle)
            let type = 'middle';
            if (i === 0) type = 'start';
            else if (i === len - 1) type = 'end';

            const phrases = data[type] || data['middle'] || data['start'] || data['end'];
            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
            
            html += `
                <div class="poem-line">
                    <div class="initial-box">${char}</div>
                    <div class="content-text">${randomPhrase}</div>
                </div>
            `;
        }

        card.innerHTML = html;
        card.style.display = 'block';
        copyBtn.style.display = 'block';
        
        card.style.animation = 'none';
        card.offsetHeight; 
        card.style.animation = null;
    }

    function copyToClipboard() {
        const card = document.getElementById('poemCard');
        const lines = card.querySelectorAll('.poem-line');
        let text = "";
        
        lines.forEach(line => {
            const initial = line.querySelector('.initial-box').innerText;
            const content = line.querySelector('.content-text').innerText;
            text += `${initial}: ${content}\n`;
        });

        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        });
    }

    document.getElementById('nameInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') generatePoem();
    });

    window.onload = () => document.getElementById('nameInput').focus();
</script>

</body>
</html>
