<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼행시 마스터 | Samhaengsi Master</title>
    <style>
        :root {
            --primary-color: #1a237e;
            --accent-color: #3f51b5;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212121;
            --text-sub: #757575;
            --border-color: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            max-width: 480px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.8rem;
            color: var(--primary-color);
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 0.95rem;
            color: var(--text-sub);
        }

        .input-section {
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            background-color: #fff;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(63, 81, 181, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-color);
            transform: translateY(-1px);
        }

        .btn-copy {
            background-color: #f1f3f4;
            color: var(--text-main);
            display: none;
        }

        .btn-copy:hover {
            background-color: #e8eaed;
        }

        #result-area {
            margin-top: 40px;
            text-align: left;
        }

        .poem-card {
            padding: 24px;
            background-color: #fafafa;
            border-radius: 16px;
            border-left: 4px solid var(--primary-color);
            display: none;
            animation: slideUp 0.4s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .poem-line {
            margin-bottom: 16px;
            display: flex;
            align-items: center;
        }

        .poem-line:last-child {
            margin-bottom: 0;
        }

        .initial-box {
            width: 36px;
            height: 36px;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            font-weight: 900;
            font-size: 1.1rem;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .content-text {
            font-size: 1.05rem;
            color: #333;
            font-weight: 500;
            line-height: 1.5;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #bdc3c7;
        }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>SAMHAENGSI</h1>
        <p>참신하고 재치 있는 일상 삼행시를 지어드립니다.</p>
    </div>

    <div class="input-section">
        <input type="text" id="nameInput" placeholder="이름을 입력하세요 (예: 김철수)" maxlength="10">
    </div>

    <div class="btn-group">
        <button class="btn-primary" onclick="generatePoem()">삼행시 생성 ✨</button>
        <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">복사하기 📋</button>
    </div>

    <div id="result-area">
        <div id="poemCard" class="poem-card"></div>
    </div>

    <div class="footer">
        © 2026 Samhaengsi Master. All rights reserved.
    </div>
</div>

<div id="toast">복사되었습니다!</div>

            middle: ['나를 설레게 하는 당신의 깜짝 선물', '나긋나긋한 목소리에 마음이 편안해지는'],
            end: ['나날이 리즈 갱신 중인 당신이 최고예요', '나란히 걷는 이 길이 참 좋습니다']
        },
        '다': {
            start: ['다 잘될 거예요, 걱정은 잠시 접어두고', '다채로운 일상의 조각들이 모여', '다이어트는 내일부터! 오늘은 맛있게'],
            middle: ['다정한 말투에 사르르 녹아버리는 마음', '다시 시작하는 설렘으로 가득한 오늘'],

        },
        '마': {
            start: ['마음 속에 저장하고 싶은 오늘의 풍경', '마법처럼 기분 좋은 일이 생길 것 같아', '마지막까지 놓칠 수 없는 꿀잼 같은 인생'],
            middle: ['마주 앉아 도란도란 이야기 나누고 싶은', '마음껏 기지개 켜고 기분 좋게 시작하는'],
            end: ['마침내 빛을 발할 당신의 노력을 믿습니다', '마음 부자가 되는 넉넉한 하루 보내세요']
        },
        '바': {
            start: ['바쁜 일상 속에서도 잃지 않는 유머', '바람 소리가 기분 좋게 귓가를 스칠 때', '바다 보러 가고 싶은 훌쩍 떠나고픈 날'],
            middle: ['바라만 봐도 비타민 충전되는 기분', '바삐 움직이는 세상 속 나만의 속도로'],
            end: ['바라는 모든 일이 ' + '착착' + ' 이뤄질 거예요', '바닥난 에너지도 풀충전되는 하루 되길']

        '사': {
            start: ['사랑 가득한 하트 뿅뿅 보내요', '사실 넌 존재 자체로 완벽해', '사소한 행복이 진짜 큰 행복인 거 알죠?'],
            middle: ['사이다처럼 톡 쏘는 청량한 매력으로', '사계절 내내 보고 싶은 최애 같은 사람'],
            end: ['사뿐사뿐 꽃길만 걷게 해줄게요', '사라지지 않을 기분 좋은 여운을 남겨주세요']
        },
        '아': {
            start: ['아침에 눈 떴을 때 컨디션 최상인 날', '아이스 아메리카노 한 잔의 수혈처럼', '아무도 모르게 나만 알고 싶은 비밀'],
            middle: ['아낌없이 칭찬해주고 싶은 당신의 열정', '아주 작은 것에서도 감사함을 찾아내는'],
            end: ['아름다운 오늘을 멋지게 기록해봐요', '아우라가 느껴지는 당신, 오늘도 화이팅!']
        },
        '자': {
            start: ['자꾸만 손이 가는 새우깡 같은 매력', '자신감 뿜뿜! 오늘은 내가 주인공', '자연스럽게 웃음이 터져 나오는 순간'],
            middle: ['자기만의 확고한 취향이 멋진 당신', '자유롭게 날개를 펴고 하고 싶은 거 다 해'],
            end: ['자랑스러운 나의 친구, 나의 스타', '자다 깨도 생각나는 마성의 매력 소유자']
        },
        '차': {
            start: ['차분하게 차 한 잔 마시며 힐링 타임', '차원이 다른 센스에 감탄이 절로'],
            middle: ['차가운 세상을 따뜻한 온기로 채워주는', '차곡차곡 쌓인 포인트처럼 든든한 실력'],
            end: ['차세대 인싸는 바로 당신입니다', '차원이 다른 행복을 선물해 줄게요']
        },
        '카': {
            start: ['카톡 소리에 심장이 바운스 바운스', '카메라 렌즈를 압도하는 비주얼'],
            middle: ['카리스마 넘치는 결정력에 무릎을 탁!', '카레보다 중독성 강한 당신의 매력'],
            end: ['카운트다운 시작! 당신의 시대가 옵니다', '카페라떼처럼 부드러운 하루 보내세요']
        },
        '타': {
            start: ['타이밍 좋게 신호등이 초록불일 때', '타인보다 나를 더 사랑하는 연습'],
            middle: ['타오르는 열정으로 월요병도 태워버려', '타의 추종을 불허하는 독보적인 존재감'],
            end: ['타인에게 선한 영향력을 주는 사람', '타임머신 타고 미래로 가도 당신이 최고']
        },
        '파': {
            start: ['파란 하늘 보며 기분 전환 어때요?', '파티 타임! 오늘 밤 주인공은 나야 나'],
            middle: ['파워풀한 에너지로 분위기 메이커 노릇 톡톡', '파도처럼 밀려오는 감동의 도가니'],
            end: ['파이팅 넘치는 당신의 앞날을 응원합니다', '파스텔톤 꿈을 현실로 만들어봐요']
        },
        '하': {
            start: ['하늘이 내린 최고의 선물은 바로 당신', '하루 종일 뒹굴뒹굴하고 싶은 토요일', '하이라이트 장면만 모아놓은 인생 영화처럼'],
            middle: ['해맑은 미소로 모든 걱정을 잊게 만드는', '하루하루 성장하는 모습이 눈부시게 멋진'],
            end: ['하이파이브하며 성공을 축하할 날을 위해', '하늘만큼 땅만큼 널 좋아해!']
        },
        '김': {
            start: ['김이 모락모락 나는 갓 지은 밥처럼 포근한', '김밥 속에 꽉 찬 속재료처럼 알찬 매력'],

        },
        '이': {
            start: ['이 세상 텐션이 아닌 역대급 텐션', '이거 실화냐? 싶을 정도로 완벽한 미모'],
            middle: ['이슬처럼 맑고 깨끗한 마음씨를 가진'],

        },
        '박': {
            start: ['박수 세 번 시작! 짝짝짝 응원해요', '박력 있게 밀어붙이는 당신의 멋짐'],
            middle: ['박하사탕처럼 시원하고 상큼한 매력'],

        },
        '최': {
            start: ['최고의 플레이어, 바로 당신입니다', '최애 등극! 내 마음 속 1순위'],
            middle: ['최선을 다하는 모습에 입덕 완료'],
            end: ['최종 보스처럼 카리스마 넘치는 성공을 기원해요']

        '정': {
            start: ['정답은 정해져 있어, 당신은 멋지다는 것', '정주행하고 싶은 당신의 매력적인 일상'],
            middle: ['정성 가득 담긴 마음이 느껴지는 사람'],

    function generatePoem() {
        const input = document.getElementById('nameInput');
        const card = document.getElementById('poemCard');
        const copyBtn = document.getElementById('copyBtn');
        const name = input.value.trim();

        if (!name) {
            alert('이름을 입력해주세요!');
            return;
        }

        let html = '';
        const len = name.length;

        for (let i = 0; i < len; i++) {
            const char = name[i];
            const data = database[char] || {
                start: [`${char}르르... 당신의 매력에 빠져드는 소리`, `${char}큼한 매력이 터지는 순간`],
                middle: [`${char}신만의 독특한 색깔이 돋보이는`, `${char}꾸만 생각나는 마성의 존재감`],
                end: [`${char}말 고생 많았어요, 오늘은 푹 쉬어요`, `${char}일은 더 행복한 일이 생길 거예요`]
            };

            let type = 'middle';
            if (i === 0) type = 'start';
            else if (i === len - 1) type = 'end';

            const phrases = data[type] || data['middle'] || data['start'] || data['end'];
            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
            
            html += `
                <div class="poem-line">
                    <div class="initial-box">${char}</div>
                    <div class="content-text">${randomPhrase}</div>
                </div>
            `;
        }

        card.innerHTML = html;
        card.style.display = 'block';
        copyBtn.style.display = 'block';
        
        card.style.animation = 'none';
        card.offsetHeight; 
        card.style.animation = null;
    }

    function copyToClipboard() {
        const card = document.getElementById('poemCard');
        const lines = card.querySelectorAll('.poem-line');
        let text = "";
        
        lines.forEach(line => {
            const initial = line.querySelector('.initial-box').innerText;
            const content = line.querySelector('.content-text').innerText;
            text += `${initial}: ${content}\n`;
        });

        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        });
    }

    document.getElementById('nameInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') generatePoem();
    });

    window.onload = () => document.getElementById('nameInput').focus();
</script>

</body>
</html>
