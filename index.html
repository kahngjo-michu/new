<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼행시 마스터 | Samhaengsi Master</title>
    <style>
        :root {
            --primary-color: #1a237e;
            --accent-color: #3f51b5;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212121;
            --text-sub: #757575;
            --border-color: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            max-width: 480px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.8rem;
            color: var(--primary-color);
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 0.95rem;
            color: var(--text-sub);
        }

        .input-section {
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            background-color: #fff;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(63, 81, 181, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-color);
            transform: translateY(-1px);
        }

        .btn-copy {
            background-color: #f1f3f4;
            color: var(--text-main);
            display: none;
        }

        .btn-copy:hover {
            background-color: #e8eaed;
        }

        #result-area {
            margin-top: 40px;
            text-align: left;
        }

        .poem-card {
            padding: 24px;
            background-color: #fafafa;
            border-radius: 16px;
            border-left: 4px solid var(--primary-color);
            display: none;
            animation: slideUp 0.4s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .poem-line {
            margin-bottom: 16px;
            display: flex;
            align-items: center;
        }

        .poem-line:last-child {
            margin-bottom: 0;
        }

        .initial-box {
            width: 36px;
            height: 36px;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            font-weight: 900;
            font-size: 1.1rem;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .content-text {
            font-size: 1.05rem;
            color: #333;
            font-weight: 500;
            line-height: 1.5;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #bdc3c7;
        }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>SAMHAENGSI</h1>
        <p>말이 되는, 자연스러운 삼행시를 지어드립니다.</p>
    </div>

    <div class="input-section">
        <input type="text" id="nameInput" placeholder="이름을 입력하세요 (예: 김철수)" maxlength="10">
    </div>

    <div class="btn-group">
        <button class="btn-primary" onclick="generatePoem()">삼행시 생성 ✨</button>
        <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">복사하기 📋</button>
    </div>

    <div id="result-area">
        <div id="poemCard" class="poem-card"></div>
    </div>

    <div class="footer">
        © 2026 Samhaengsi Master. All rights reserved.
    </div>
</div>

<div id="toast">복사되었습니다!</div>

<script>

            end: ['나만의 멋진 이야기를 완성해가길 바랍니다', '나날이 더해가는 매력적인 당신을 응원해요']
        },
        '다': {
            start: ['다시 한번 돌아보게 되는 당신의 매력'],

            end: ['다 실현될 당신의 소망을 간절히 믿습니다', '다시는 오지 않을 오늘을 소중히 간직하세요']
        },
        '라': {
            start: ['라일락 향기처럼 은은한 당신의 존재'],
            middle: ['라인을 그리듯 우아하게 펼쳐지는 삶이', '라이브처럼 생동감 넘치는 당신의 에너지가'],
            end: ['라라라 즐겁게 노래하는 인생이 되길 바라요', '라이징 스타처럼 높이 날아오를 당신입니다']

            end: ['마음껏 웃을 수 있는 행복한 날들만 보내세요', '마주보는 모든 순간이 축복이 되길 바랍니다']
        },
        '바': {
            start: ['바라만 봐도 미소가 지어지는 사람'],
            middle: ['바람처럼 시원하고 바다처럼 넓은 마음으로', '바삐 흘러가는 세상 속 쉼표가 되어주는'],
            end: ['바보 같은 우직함이 결국 결실을 맺을 거예요', '바라는 모든 일들이 기적처럼 이뤄질 것입니다']
        },
        '사': {
            start: ['사랑스러운 눈빛을 가진 당신'],
            middle: ['사계절 내내 변함없는 따뜻한 온기로', '사실 누구보다 깊은 내면의 힘을 품고'],
            end: ['사뿐히 내딛는 발걸음마다 꽃길이 되길 바라요', '사라지지 않을 영원한 감동을 응원합니다']
        },
        '아': {
            start: ['아름다운 이야기가 시작되는 순간'],
            middle: ['아침 햇살보다 더 투명하고 맑은 성품으로', '아무도 모르게 쌓아온 노력들이 꽃을 피워'],
            end: ['아낌없이 사랑받고 사랑하는 삶이 되길 바라요', '아름다움 그 이상의 가치를 증명할 당신입니다']
        },
        '자': {
            start: ['자기 자신을 누구보다 사랑하는 당신'],
            middle: ['자연스럽게 스며드는 편안한 분위기로', '자신감 넘치는 당당한 그 모습 속에서'],
            end: ['자랑스러운 당신의 이름이 빛나길 바랍니다', '자유로운 날개를 펴고 더 높이 비상하세요']
        },
        '차': {
            start: ['차분하게 자신의 때를 기다릴 줄 아는'],
            middle: ['차가운 세상 속에서도 뜨거운 심장을 가진', '차곡차곡 쌓아올린 실력과 인품이 조화로운'],
            end: ['차원이 다른 성공의 주인공이 될 것입니다', '차 한 잔의 여유 같은 평온함이 함께하길']
        },
        '카': {
            start: ['카리스마 넘치는 모습 뒤의 따뜻함'],

            end: ['카운트다운 끝에 시작될 당신의 전성기입니다', '카레라떼처럼 부드러운 축복이 깃들길 바랍니다']
        },
        '타': {
            start: ['타인을 먼저 배려하는 고귀한 마음'],
            middle: ['타이밍 좋게 찾아온 일생의 기회를 잡아', '타오르는 불꽃보다 더 뜨거운 열정으로'],
            end: ['타의 추종을 불허하는 최고의 자리에 서길', '타인에게 희망이 되는 존재로 남을 것입니다']
        },

            end: ['파이팅 넘치는 당신의 매일이 성공으로 이어지길', '파스텔톤 행복이 인생을 가득 채우길 바랍니다']
        },
        '하': {
            start: ['하늘 아래 가장 빛나는 당신이라는 보석'],
            middle: ['하루하루 성실하게 꿈을 향해 나아가는', '해맑은 웃음소리가 온 세상에 퍼져나갈 때'],
            end: ['하이라이트를 장식할 인생의 주인공은 바로 당신', '하늘이 내려준 큰 복이 당신과 함께할 것입니다']
        },
        '김': {
            start: ['김 모락모락 나는 따뜻한 마음을 가진'],
            middle: ['기운찬 발걸음으로 내일을 향해 나아가는'],
            end: ['깊은 울림을 주는 당신의 진심을 응원합니다']
        },
        '이': {
            start: ['이 세상 누구보다 소중한 존재인 당신'],
            middle: ['이슬처럼 맑고 깨끗한 영혼을 간직한'],
            end: ['이토록 아름다운 당신의 앞날을 축복합니다']
        },
        '박': {
            start: ['박수 갈채 속에 빛날 당신의 무대'],
            middle: ['박력 넘치는 에너지와 섬세한 감성을 가진'],
            end: ['박차를 가해 꿈을 향해 나아갈 당신을 믿습니다']
        },
        '최': {
            start: ['최고라는 말로도 부족한 당신의 가치'],
            middle: ['최선을 다하는 그 뒷모습이 정말 아름다운'],
            end: ['최종 목적지에서 환하게 웃을 당신을 응원합니다']
        },
        '정': {
            start: ['정직하고 올바른 마음을 지향하는'],
            middle: ['정성 어린 노력들이 모여 큰 결실을 맺는'],
            end: ['정겨운 미소로 사람들에게 행복을 주는 분']
        }
    };

    function generatePoem() {
        const input = document.getElementById('nameInput');
        const card = document.getElementById('poemCard');
        const copyBtn = document.getElementById('copyBtn');
        const name = input.value.trim();

        if (!name) {
            alert('이름을 입력해주세요!');
            return;
        }

        let html = '';
        const len = name.length;

        for (let i = 0; i < len; i++) {
            const char = name[i];
            
            // 데이터가 없는 글자는 범용 문구로 대체 (억지 단어 제거)
            const data = database[char] || {
                start: [`${char}라는 이름에 담긴 소중한 가치`, `${char}으로 시작되는 당신만의 이야기`],
                middle: [`${char}연스럽게 묻어나는 따뜻한 인품으로`, `${char}분하게 내실을 다져온 실력을 바탕으로`],
                end: [`${char}말 멋진 내일을 만들어갈 당신을 응원합니다`, `${char}일 더 빛날 당신의 이름을 기억하겠습니다`]
            };

            let type = 'middle';
            if (i === 0) type = 'start';
            else if (i === len - 1) type = 'end';

            const phrases = data[type] || data['middle'] || data['start'] || data['end'];
            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
            
            html += `
                <div class="poem-line">
                    <div class="initial-box">${char}</div>
                    <div class="content-text">${randomPhrase}</div>
                </div>
            `;
        }

        card.innerHTML = html;
        card.style.display = 'block';
        copyBtn.style.display = 'block';
        
        card.style.animation = 'none';
        card.offsetHeight; 
        card.style.animation = null;
    }

    function copyToClipboard() {
        const card = document.getElementById('poemCard');
        const lines = card.querySelectorAll('.poem-line');
        let text = "";
        
        lines.forEach(line => {
            const initial = line.querySelector('.initial-box').innerText;
            const content = line.querySelector('.content-text').innerText;
            text += `${initial}: ${content}\n`;
        });

        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        });
    }

    document.getElementById('nameInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') generatePocode();
    });

    window.onload = () => document.getElementById('nameInput').focus();
</script>

</body>
</html>
