<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --primary-color: #ff85a2;
            --secondary-color: #fce4ec;
            --accent-color: #ff4081;
            --text-color: #444;
            --bg-color: #fff9fb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 133, 162, 0.2);
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        p.subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--secondary-color);
            border-radius: 15px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            margin-bottom: 10px;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
            box-shadow: 0 5px 15px rgba(255, 133, 162, 0.4);
        }

        button:hover {
            background-color: var(--accent-color);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        #result {
            margin-top: 40px;
            min-height: 150px;
            text-align: left;
        }

        .line {
            margin-bottom: 15px;
            opacity: 0;
            transform: translateX(-20px);
            transition: all 0.5s ease-out;
            display: flex;
            align-items: flex-start;
        }

        .line.show {
            opacity: 1;
            transform: translateX(0);
        }

        .initial {
            background-color: var(--primary-color);
            color: white;
            width: 35px;
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .content {
            font-size: 1.1rem;
            line-height: 35px;
            color: #333;
            font-weight: 500;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #ccc;
        }

        @media (max-width: 400px) {
            .container { padding: 25px; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>

    <div class="footer">
        © 2026 Idol Samhaengsi Maker

</div>

        '소': ['소중한 너의 꿈이 꼭 이뤄지길 기도해', '소녀 같은 순수함과 성숙한 매력의 공존'],

    ];

    function generateSamhaengsi() {
        const nameInput = document.getElementById('nameInput');
        const resultDiv = document.getElementById('result');
        let name = nameInput.value.trim();
        
        // 입력창이 비어있을 경우에만 랜덤 아이돌 선택
        if (!name) {
            const randomIdx = Math.floor(Math.random() * defaultIdols.length);
            name = defaultIdols[randomIdx];
            nameInput.value = name;
        }
        
        resultDiv.innerHTML = '';
        let poem = [];

        for (let char of name) {
            const phrases = randomPhrases[char] || [
                `${char}상한 매력을 가진 사람`, 
                `${char}음에도 잊지 못할 이름`,
                `${char}곡하게 널 기다려왔어`,
                `${char}명히 넌 빛나는 별이 될 거야`
            ];
            // 글자별 문구 리스트에서 매번 랜덤하게 선택
            const randomIdx = Math.floor(Math.random() * phrases.length);
            poem.push(phrases[randomIdx]);
        }

        poem.forEach((content, index) => {
            const line = document.createElement('div');
            line.className = 'line';
            line.innerHTML = `
                <div class="initial">${name[index]}</div>
                <div class="content">${content}</div>
            `;
            resultDiv.appendChild(line);
            void line.offsetWidth;
            setTimeout(() => { line.classList.add('show'); }, index * 400);
        });
    }
</script>

</html>
