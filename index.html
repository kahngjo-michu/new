<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼행시 마스터 | Samhaengsi Master</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>SAMHAENGSI MASTER</h1>
        <p>평범한 이름은 멋지게, 희귀한 이름은 웃기게 지어드려요.</p>
    </div>

    <div class="input-section">
        <input type="text" id="nameInput" placeholder="이름을 입력하세요 (예: 김철수)" maxlength="10">
    </div>

    <div class="btn-group">
        <button class="btn-primary" onclick="generatePoem()">삼행시 생성 ✨</button>
        <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">복사하기 📋</button>
    </div>

    <div id="result-area">
        <div id="poemCard" class="poem-card"></div>
    </div>

    <!-- Comment Section (Giscus Integration) -->
    <div class="comment-section" style="margin-top: 50px; text-align: left; border-top: 2px solid var(--border-color); padding-top: 30px;">
        <h2 style="font-size: 1.2rem; color: var(--primary-color); margin-bottom: 20px;">응원 한마디 💬</h2>
        
        <script src="https://giscus.app/client.js"
                data-repo="kahngjo-michu/new"
                data-repo-id="R_kgDOSAjq4Q"
                data-category="General"
                data-category-id="DIC_kwDOSAjq4c4C6vnS"
                data-mapping="pathname"
                data-strict="0"
                data-reactions-enabled="1"
                data-emit-metadata="0"
                data-input-position="bottom"
                data-theme="light"
                data-lang="ko"
                crossorigin="anonymous"
                async>
        </script>
    </div>

    <div class="footer">
        © 2026 Samhaengsi Master. All rights reserved.
        <br><br>
        <a href="#" onclick="toggleForm(); return false;" style="color: var(--accent-color); text-decoration: none; font-weight: 600;">제휴 및 비즈니스 문의</a>
    </div>

    <!-- Formspree Partnership Form -->
    <div id="partnership-form" class="partnership-section" style="display: none; margin-top: 30px; text-align: left; border-top: 1px solid var(--border-color); padding-top: 30px;">
        <h2 style="font-size: 1.2rem; color: var(--primary-color); margin-bottom: 15px;">제휴 문의하기</h2>
        <form action="https://formspree.io/f/mqewkakv" method="POST">
            <div class="input-group">
                <label for="comp-name">성함/업체명</label>
                <input type="text" name="name" id="comp-name" required placeholder="예: (주)샘플">
            </div>
            <div class="input-group">
                <label for="email">이메일 주소</label>
                <input type="email" name="_replyto" id="email" required placeholder="example@domain.com">
            </div>
            <div class="input-group">
                <label for="message">문의 내용</label>
                <textarea name="message" id="message" required placeholder="문의하실 내용을 입력해주세요."></textarea>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 15px;">문의 보내기</button>
        </form>
    </div>
</div>

<div id="toast">복사되었습니다!</div>

<script src="main.js"></script>
</body>
</html>
