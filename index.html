<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Pop Idol Samhaengsi | 아이돌 삼행시</title>
    <style>
        :root {
            --primary-color: #ff85a2;
            --secondary-color: #fce4ec;
            --accent-color: #ff4081;
            --text-color: #444;
            --bg-color: #fff9fb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 133, 162, 0.2);
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        p.subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        select, input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--secondary-color);
            border-radius: 15px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            margin-bottom: 10px;
        }

        select:focus, input:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
            box-shadow: 0 5px 15px rgba(255, 133, 162, 0.4);
        }

        button:hover {
            background-color: var(--accent-color);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        #result {
            margin-top: 40px;
            min-height: 150px;
            text-align: left;
        }

        .line {
            margin-bottom: 15px;
            opacity: 0;
            transform: translateX(-20px);
            transition: all 0.5s ease-out;
            display: flex;
            align-items: flex-start;
        }

        .line.show {
            opacity: 1;
            transform: translateX(0);
        }

        .initial {
            background-color: var(--primary-color);
            color: white;
            width: 35px;
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .content {
            font-size: 1.1rem;
            line-height: 35px;
            color: #333;
            font-weight: 500;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #ccc;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .container {
                padding: 25px;
            }
            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎀 아이돌 삼행시</h1>
    <p class="subtitle">내가 좋아하는 아이돌 이름으로 삼행시를 지어봐요!</p>

    <div class="input-group">
        <input type="text" id="nameInput" placeholder="아이돌 이름을 입력하세요 (예: 장원영)">
    </div>

    <button onclick="generateSamhaengsi()">삼행시 생성하기 ✨</button>

    <div id="result">
        <!-- 결과가 여기에 표시됩니다 -->
    </div>

    <div class="footer">
        © 2026 Idol Samhaengsi Maker
    </div>
</div>

<script>
    const randomPhrases = {
        '가': ['가장 빛나는 사람', '가슴이 두근거려', '가까이서 보고 싶은 미소', '가늠할 수 없는 매력'],
        '나': ['나의 소중한 아이돌', '나를 웃게 만드는 너', '나만 알고 싶은 보석', '나른한 오후의 햇살 같은 너'],
        '다': ['다시 태어나도 팬이 될게', '다정한 너의 목소리', '다 비켜! 우리 애가 최고야', '다채로운 매력의 소유자'],
        '라': ['라벤더 향기 같은 그녀', '라디오에서 들리는 네 목소리', '라라라 노래 부르는 모습', '라이브까지 완벽한 실력'],
        '마': ['마음이 따뜻한 사람', '마지막까지 함께할게', '마법처럼 빠져드는 눈빛', '마음속 깊이 저장!'],
        '바': ['바라만 봐도 행복해', '바람처럼 시원한 춤선', '바다처럼 깊은 눈동자', '바보처럼 너만 보게 돼'],
        '사': ['사랑할 수밖에 없는 매력', '사실 널 정말 좋아해', '사르르 녹는 너의 미소', '사계절 내내 보고 싶어'],
        '아': ['아름다움의 결정체', '아낌없이 주고 싶은 마음', '아침을 깨우는 상큼함', '아우라가 느껴지는 무대'],
        '자': ['자기만의 색깔이 뚜렷해', '자꾸만 생각나는 얼굴', '자신감 넘치는 그 모습', '자유로운 영혼의 아티스트'],
        '차': ['차원이 다른 퍼포먼스', '차가운 세상을 녹이는 미소', '차분하면서도 강한 에너지', '차세대 퀸의 등장'],
        '카': ['카메라를 압도하는 눈빛', '카페라떼처럼 부드러운 목소리', '카리스마의 정석', '카운트다운이 시작되는 무대'],
        '타': ['타의 추종을 불허하는 실력', '타이밍 좋게 나타난 나의 스타', '타오르는 열정의 무대', '타인까지 행복하게 만드는 에너지'],
        '파': ['파란 하늘처럼 맑은 너', '파워풀한 무대 매너', '파도처럼 밀려오는 감동', '파스텔톤 꿈 같은 존재'],
        '하': ['하루 종일 너만 생각해', '하늘이 내려준 선물', '하얀 눈처럼 깨끗한 영혼', '하이라이트를 장식하는 주인공'],
        '미': ['미소가 정말 예쁜 그녀', '미래가 기대되는 스타', '미로처럼 빠져드는 매력', '미스테리할 정도로 완벽해'],
        '추': ['추억을 함께 만들고 싶어', '추위도 잊게 만드는 열정', '추천하고 싶은 단 하나의 스타', '추종할 수 없는 분위기'],
        '원': ['원하는 건 뭐든 해주고파', '원픽은 언제나 너야', '원더풀한 무대 장악력', '원형 경기장을 가득 채울 함성'],
        '영': ['영원히 기억될 이름', '영혼을 울리는 목소리', '영광스러운 순간을 함께해', '영리하게 무대를 즐기는 모습'],
        '윤': ['윤기 나는 너의 꿈을 응원해', '윤슬처럼 빛나는 눈동자', '윤택한 삶을 선물해주는 너', '윤곽마저 완벽한 비주얼'],
        '지': ['지금 이 순간 가장 소중해', '지치지 말고 화이팅!', '지구상 최고의 아이돌', '지독하게 널 좋아해'],
        '현': ['현실 세계에 강림한 여신', '현재 진행형인 너의 성장', '현란한 춤 실력에 입을 못 다물어', '현장 분위기를 압도하는 포스'],
        '희': ['희망을 주는 너의 존재', '희귀한 보석 같은 사람', '희열을 느끼게 하는 고음', '희망차게 앞을 향해 나가는 너'],
        '채': ['채워지지 않는 팬심', '채색된 꿈처럼 아름다워', '채널 고정하게 만드는 매력', '채고(최고)라는 말밖엔 안 나와'],
        '안': ['안구 정화 제대로 시켜주는 비주얼', '안정적인 가창력의 소유자', '안아주고 싶은 소중한 사람', '안개 속에서도 빛나는 별'],
        '유': ['유능함까지 겸비한 만능돌', '유니크한 너만의 스타일', '유독 눈에 띄는 존재감', '유리처럼 투명하고 맑은 눈'],
        '진': ['진심으로 널 응원해', '진한 감동을 주는 무대', '진정한 프로다운 모습', '진흙 속에서 핀 연꽃 같아'],
        '설': ['설레는 마음을 감출 수 없어', '설명할 필요 없는 완벽함', '설탕처럼 달콤한 목소리', '설원 위의 요정 같은 비주얼'],
        '민': ['민낯까지 예쁜 청순 대명사', '민트처럼 상큼한 매력', '민첩한 동작과 파워풀한 춤', '민심을 사로잡은 국민 아이돌'],
        '예': ['예사롭지 않은 춤선과 눈빛', '예쁜 마음씨까지 가졌어', '예측 불가능한 팔색조 매력', '예술 작품 같은 미모'],
        '사': ['사뿐사뿐 춤추는 요정', '사무치게 그리운 너의 목소리', '사이다처럼 시원한 고음', '사차원적인 엉뚱한 매력'],
        '쿠': ['쿠키처럼 달콤한 미소', '쿠션처럼 편안한 너의 목소리', '쿠르릉 심장을 울리는 베이스'],
        '라': ['라일락처럼 향기로운 존재', '라이트하게 즐기려다 입덕 완료', '라인이 살아있는 완벽한 안무'],
        '장': ['장난기 넘치는 귀여운 모습', '장면마다 화보 같은 비주얼', '장거리 비행도 잊게 만드는 설렘', '장담컨대 넌 최고의 스타야']
    };

    const defaultIdols = ['장원영', '카리나', '하니', '안유진', '윈터', '설윤', '사쿠라', '민지', '김채원', '예지', '해린', '다니엘', '닝닝', '지젤', '레이', '가을', '이서', '리즈'];

    function generateSamhaengsi() {
        const nameInput = document.getElementById('nameInput');
        const resultDiv = document.getElementById('result');
        
        let name = nameInput.value.trim();

        // 이름이 입력되지 않았을 경우 랜덤으로 하나 선택
        if (!name) {
            const randomIdx = Math.floor(Math.random() * defaultIdols.length);
            name = defaultIdols[randomIdx];
            nameInput.value = name; // 입력창에도 표시
        }

        resultDiv.innerHTML = '';
        let poem = [];

        for (let char of name) {
            const phrases = randomPhrases[char] || [
                `${char}상한 매력을 가진 사람`, 
                `${char}음에도 잊지 못할 이름`,
                `${char}곡하게 널 기다려왔어`,
                `${char}명히 넌 빛나는 별이 될 거야`
            ];
            const randomIdx = Math.floor(Math.random() * phrases.length);
            poem.push(phrases[randomIdx]);
        }

        poem.forEach((content, index) => {
            const line = document.createElement('div');
            line.className = 'line';
            line.innerHTML = `
                <div class="initial">${name[index]}</div>
                <div class="content">${content}</div>
            `;
            resultDiv.appendChild(line);

            void line.offsetWidth;

            setTimeout(() => {
                line.classList.add('show');
            }, index * 400);
        });
    }
</script>

</body>
</html>
