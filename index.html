<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼행시 마스터 | Samhaengsi Master</title>
    <style>
        :root {
            --primary-color: #1a237e;
            --accent-color: #3f51b5;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212121;
            --text-sub: #757575;
            --border-color: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            max-width: 520px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.8rem;
            color: var(--primary-color);
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 0.95rem;
            color: var(--text-sub);
        }

        .input-section {
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            background-color: #fff;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(63, 81, 181, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-color);
            transform: translateY(-1px);
        }

        .btn-copy {
            background-color: #f1f3f4;
            color: var(--text-main);
            display: none;
        }

        .btn-copy:hover {
            background-color: #e8eaed;
        }

        #result-area {
            margin-top: 40px;
            text-align: left;
        }

        .poem-card {
            padding: 24px;
            background-color: #fafafa;
            border-radius: 16px;
            border-left: 4px solid var(--primary-color);
            display: none;
            animation: slideUp 0.4s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .poem-line {
            margin-bottom: 16px;
            display: flex;
            align-items: center;
        }

        .poem-line:last-child {
            margin-bottom: 0;
        }

        .initial-box {
            width: 36px;
            height: 36px;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            font-weight: 900;
            font-size: 1.1rem;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .content-text {
            font-size: 1.05rem;
            color: #333;
            font-weight: 500;
            line-height: 1.5;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #bdc3c7;
        }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>SAMHAENGSI MASTER</h1>
        <p>평범한 이름은 멋지게, 희귀한 이름은 웃기게 지어드려요.</p>
    </div>

    <div class="input-section">
        <input type="text" id="nameInput" placeholder="이름을 입력하세요 (예: 김철수)" maxlength="10">
    </div>

    <div class="btn-group">
        <button class="btn-primary" onclick="generatePoem()">삼행시 생성 ✨</button>
        <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">복사하기 📋</button>
    </div>

    <div id="result-area">
        <div id="poemCard" class="poem-card"></div>
    </div>

    <div class="footer">
        © 2026 Samhaengsi Master. All rights reserved.
    </div>
</div>

<div id="toast">복사되었습니다!</div>

        },
        '아': {
            start: ['아침에 눈 떴을 때 컨디션 최상인 날', '아이스 아메리카노 한 잔의 수혈처럼'],
            middle: ['아주 작은 것에서도 감사함을 찾아내는', '아름다운 풍경 속에 당신이 있어 완벽한'],
            end: ['아름다운 오늘을 멋지게 기록해봐요', '아침이 올 때까지 푹 잘 자요, 굿나잇']
        },
        '자': {
            start: ['자꾸만 손이 가는 새우깡 같은 매력', '자신감 뿜뿜! 오늘은 내가 주인공'],
            middle: ['자유롭게 날개를 펴고 하고 싶은 거 다 해', '자랑하고 싶은 당신의 업무 능력과 센스'],
            end: ['자랑스러운 나의 친구, 언제나 당신 편이야', '자고 일어나면 더 좋은 일이 생길 거예요']

            middle: ['차세대 리더로서의 자질이 충분한 당신', '차분한 목소리로 전하는 진심 어린 위로'],
            end: ['차세대 인싸는 바로 당신입니다, 화이팅', '차원이 다른 행복을 선물해 줄게요']
        },

            start: ['카톡 소리에 심장이 바운스 설레는 아침', '카메라 렌즈를 압도하는 당신의 비주얼'],
            middle: ['카운트다운 시작! 당신의 시대가 옵니다', '카페라떼처럼 부드럽고 포근한 목소리'],

            end: ['하하하 웃음소리가 끊이지 않는 행복한 집', '하늘 위 별처럼 영원히 반짝이는 스타 되길']

            end: ['이토록 사랑스러운 당신의 앞날을 축복해요', '이루어질 거예요, 당신이 간절히 소망하던 일']

    function generatePoem() {
        const input = document.getElementById('nameInput');
        const card = document.getElementById('poemCard');
        const copyBtn = document.getElementById('copyBtn');
        const name = input.value.trim();

        if (!name) {
            alert('이름을 입력해주세요!');
            return;
        }

        let html = '';
        const len = name.length;

        for (let i = 0; i < len; i++) {
            const char = name[i];
            
            // 데이터가 없는 글자는 '완전 웃긴' 황당 문구로 대체
            const funnyFallbacks = {
                start: [
                    `${char}랄라라... 갑자기 춤추는 냉장고를 본 적 있나요?`,
                    `${char}큼한 레몬을 먹고 얼굴이 구겨진 고양이처럼`,
                    `${char}치 마켓에서 산 신비로운 항아리 속에서`,
                    `${char}라라! 외치며 화장실로 달려가는 뒷모습`,
                    `${char}기지개 켜다 허리에 담 걸린 할아버지의 심정으로`
                ],
                middle: [
                    `${char}우우... 늑대 소리를 내며 편의점으로 들어가는`,
                    `${char}파리... 아니 와이파이를 찾아 지붕 위를 헤매는`,
                    `${char}루 종일 비둘기랑 대화하며 빵 부스러기를 나누는`,
                    `${char}신감 넘치게 신발을 거꾸로 신고 출근하는`,
                    `${char}꾸만 콧구멍에 손이 가는 마성의 중독성으로`
                ],
                end: [
                    `${char}말 황당해서 말이 안 나오는 이 상황을 즐겨봐요`,
                    `${char}일은 꼭 정신 차리고 살아야겠다고 다짐합니다`,
                    `${char}분하게 미역국에 밥 말아 먹고 푹 자려 합니다`,
                    `${char}렁탕 국물을 원샷하고 포효하는 당신이 주인공`,
                    `${char}상한 사람 아니에요, 그냥 좀 참신할 뿐입니다`
                ]
            };

            let type = 'middle';
            if (i === 0) type = 'start';
            else if (i === len - 1) type = 'end';

            let phrases;
            if (database[char] && database[char][type]) {
                phrases = database[char][type];
            } else {
                // 데이터 없으면 웃긴 문구에서 랜덤 선택
                phrases = funnyFallbacks[type];
            }

            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
            
            html += `
                <div class="poem-line">
                    <div class="initial-box">${char}</div>
                    <div class="content-text">${randomPhrase}</div>
                </div>
            `;
        }

        card.innerHTML = html;
        card.style.display = 'block';
        copyBtn.style.display = 'block';
        
        card.style.animation = 'none';
        card.offsetHeight; 
        card.style.animation = null;
    }

    function copyToClipboard() {
        const card = document.getElementById('poemCard');
        const lines = card.querySelectorAll('.poem-line');
        if (lines.length === 0) return;

        let text = "";
        lines.forEach(line => {
            const initial = line.querySelector('.initial-box').innerText;
            const content = line.querySelector('.content-text').innerText;
            text += `${initial}: ${content}\n`;
        });

        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(() => { showToast(); });
        } else {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); showToast(); } catch (err) {}
            document.body.removeChild(textArea);
        }
    }

    function showToast() {
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }

    document.getElementById('nameInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') generatePoem();
    });

    window.onload = () => document.getElementById('nameInput').focus();
</script>

</body>
</html>
